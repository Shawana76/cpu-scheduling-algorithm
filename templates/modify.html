{% extends "base.html" %}
{% block title %}Edit Process | Process Scheduler App{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-warning">
      <div class="card-header bg-warning text-white">Edit Process Details</div>
      <div class="card-body">
        <form action="{{ url_for('process.modify_process', pid=process.pid) }}" method="post">
          <div class="form-group">
            <label for="pid">Process ID</label>
            <input type="text" class="form-control" name="pid" id="pid" value="{{ process.pid }}" required>
          </div>
          <div class="form-group">
            <label for="arrival">Arrival Time</label>
            <input type="number" class="form-control" name="arrival" id="arrival" min="0" step="any" value="{{ process.arrival }}" required>
          </div>
          <div class="form-group">
            <label for="burst">Burst Time</label>
            <input type="number" class="form-control" name="burst" id="burst" min="0" step="any" value="{{ process.burst }}" required>
          </div>
          <div class="form-group">
            <label for="priority">Priority (if any)</label>
            <input type="number" class="form-control" name="priority" id="priority" min="0" step="any" value="{{ process.priority if process.priority is not none else '' }}">
          </div>
          <button type="submit" class="btn btn-warning btn-block">Update Process</button>
        </form>
        <p class="mt-3 text-center"><a href="{{ url_for('process.dashboard') }}">Return to Dashboard</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
